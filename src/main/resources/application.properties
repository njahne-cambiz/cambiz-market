# ============================================
# CAMBIZ MARKET - BASE CONFIGURATION
# ============================================

spring.application.name=cambiz-market
server.port=${PORT:8080}

# ============================================
# ACTIVE PROFILE
# ============================================
spring.profiles.active=prod

# ============================================
# DATABASE (AUTO - OVERRIDDEN IN PROD)
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/cambiz}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:Y2FtYml6LW1hcmtldC1zZWNyZXQta2V5LTIwMjYtbXVzYS02Nzctc2VjdXJpdHktdG9rZW4tY2FtZXJvb24tbWFya2V0}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================
# EMAIL CONFIGURATION
# ============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# LOGGING
# ============================================
logging.level.com.cambiz.market=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN

# ============================================
# CORS
# ============================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ============================================
# APP INFO
# ============================================
cambiz.company-name=CamBiz Market
cambiz.version=1.0.0
cambiz.country=CM
cambiz.currency=XAF