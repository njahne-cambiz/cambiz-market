# ============================================
# CAMBIZ MARKET - APPLICATION PROPERTIES
# SECURE CONFIGURATION WITH ENVIRONMENT VARIABLES
# ============================================

# ===============================
# APPLICATION
# ===============================
spring.application.name=cambiz-market
server.port=${PORT:8080}

# ===============================
# TOMCAT CONFIGURATION
# ===============================
server.max-http-request-header-size=65536
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

# ===============================
# DATABASE CONFIGURATION (SECURE)
# ===============================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/cambiz_market?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Musa677#$}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=CambizHikariPool

# ===============================
# JPA/HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ===============================
# THYMELEAF CONFIGURATION
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# ===============================
# INTERNATIONALIZATION (i18n)
# ===============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600
spring.messages.fallback-to-system-locale=false
spring.web.locale=en

# ===============================
# JWT CONFIGURATION (SECURE)
# ===============================
jwt.secret=${JWT_SECRET:Y2FtYml6LW1hcmtldC1zZWNyZXQta2V5LTIwMjYtbXVzYS02Nzctc2VjdXJpdHktdG9rZW4tY2FtZXJvb24tbWFya2V0}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.issuer=CamBizMarket
jwt.audience=CamBizUsers

# ===============================
# MTN MONEY API CONFIGURATION (SECURE)
# ===============================
mtn.api.base-url=${MTN_API_URL:https://sandbox.momodeveloper.mtn.com}
mtn.api.primary-key=${MTN_PRIMARY_KEY:your-primary-key}
mtn.api.secondary-key=${MTN_SECONDARY_KEY:your-secondary-key}
mtn.api.target-environment=${MTN_TARGET_ENVIRONMENT:sandbox}

# ===============================
# ORANGE MONEY API CONFIGURATION (SECURE)
# ===============================
orange.api.base-url=${ORANGE_API_URL:https://api.orange.com/orange-money-webpay}
orange.api.client-id=${ORANGE_CLIENT_ID:your-client-id}
orange.api.client-secret=${ORANGE_CLIENT_SECRET:your-client-secret}
orange.api.merchant-code=${ORANGE_MERCHANT_CODE:your-merchant-code}

# ===============================
# EMAIL CONFIGURATION (FOR 2FA)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:cambiz.market@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# LOGGING
# ===============================
logging.level.com.cambiz.market=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.file.name=logs/cambiz-market.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# SPRING DEVTOOLS
# ===============================
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.livereload.enabled=true

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# ===============================
# STATIC RESOURCES
# ===============================
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.web.resources.cache.period=3600
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# ===============================
# CORS CONFIGURATION
# ===============================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ===============================
# APPLICATION SPECIFIC PROPERTIES
# ===============================
cambiz.default-language=EN
cambiz.support-email=${SUPPORT_EMAIL:support@cambiz.cm}
cambiz.support-phone=${SUPPORT_PHONE:+237670000000}
cambiz.company-name=CamBiz Market
cambiz.version=1.0.0
cambiz.country=CM
cambiz.currency=XAF

# ===============================
# SECURITY SETTINGS
# ===============================
security.2fa.enabled=${TWO_FA_ENABLED:true}
security.account-lockout.max-attempts=5
security.account-lockout.duration-minutes=15
security.password.min-length=8
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digit=true
security.password.require-special=true

# ===============================
# ACTUATOR CONFIGURATION
# ===============================
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.mail.enabled=false