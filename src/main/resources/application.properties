# ============================================
# CAMBIZ MARKET - PRODUCTION CONFIG (RAILWAY)
# ============================================

spring.application.name=cambiz-market
server.port=${PORT:8080}

# ============================================
# DATABASE - USE EXPLICIT VARIABLES (Railway compatible)
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ============================================
# JWT CONFIGURATION - WITH DEFAULTS FOR LOCAL
# ============================================
jwt.secret=${JWT_SECRET:Y2FtYml6LW1hcmtldC1zZWNyZXQta2V5LTIwMjYtbXVzYS02Nzctc2VjdXJpdHktdG9rZW4tY2FtZXJvb24tbWFya2V0}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================
# EMAIL CONFIGURATION
# ============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# LOGGING
# ============================================
logging.level.com.cambiz.market=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN

# ============================================
# CORS
# ============================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ============================================
# APP INFO
# ============================================
cambiz.company-name=CamBiz Market
cambiz.version=1.0.0
cambiz.country=CM
cambiz.currency=XAF