<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamBiz Market - Shop Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { font-size: 24px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h2 { margin: 20px 0; color: #333; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .product-name { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .product-category { font-size: 12px; color: #667eea; font-weight: 500; }
        .product-price { font-size: 24px; font-weight: bold; color: #667eea; margin: 10px 0; }
        .product-price .discount { font-size: 14px; background: #ff6b6b; color: white; padding: 3px 8px; border-radius: 10px; margin-left: 10px; }
        .product-stock { font-size: 12px; color: #10b981; }
        .loading { text-align: center; padding: 40px; font-size: 18px; color: #666; }
        .error { text-align: center; padding: 40px; color: #ff6b6b; font-size: 18px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🛒 CamBiz Market</h1>
        <span>Cameroon's Premier Marketplace</span>
    </div>

    <div class="container">
        <h2>📦 All Products (<span id="count">0</span>)</h2>
        <div class="products-grid" id="products">
            <div class="loading">Loading products...</div>
        </div>
    </div>

    <script>
        async function loadProducts() {
            try {
                const res = await fetch('/api/products?page=0&size=100');
                const data = await res.json();
                if (data.success && data.data) {
                    document.getElementById('count').textContent = data.data.length;
                    document.getElementById('products').innerHTML = data.data.map(p => `
                        <div class="product-card">
                            <div class="product-category">📱 ${p.categoryName || 'General'}</div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">
                                ${(p.discountedPrice || p.price).toLocaleString()} XAF
                                ${p.discountedPrice ? `<span class="discount">-${Math.round((1 - p.discountedPrice/p.price) * 100)}%</span>` : ''}
                            </div>
                            <div class="product-stock">✅ ${p.stockQuantity} in stock</div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('products').innerHTML = '<div class="error">Failed to load products.</div>';
                }
            } catch (e) {
                document.getElementById('products').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            }
        }
        loadProducts();
    </script>
</body>
</html>
