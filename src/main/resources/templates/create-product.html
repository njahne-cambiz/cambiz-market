<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Product | CamBiz Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f6fa; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #2d3436, #636e72); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header .logo { font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none; }
        .header nav a { color: white; text-decoration: none; margin-left: 1.5rem; }
        .container { max-width: 650px; margin: 2rem auto; padding: 0 1.5rem; }
        .back-btn { color: #0984e3; text-decoration: none; margin-bottom: 1.5rem; display: inline-block; }
        .card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card h1 { color: #2d3436; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; color: #2d3436; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 14px; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { padding: 14px 24px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; }
        .btn-primary { background: #0984e3; color: white; }
        .btn-primary:disabled { background: #b2bec3; cursor: not-allowed; }
        .message { margin-top: 1rem; padding: 0.75rem; border-radius: 10px; display: none; text-align: center; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <a href="/store" class="logo">🛒 CamBiz Market</a>
        <nav>
            <a href="/store">📦 Products</a>
            <a href="/dashboard">👤 Dashboard</a>
        </nav>
    </header>

    <main class="container">
        <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
        <div class="card">
            <h1>📦 Create New Product</h1>
            
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="name" placeholder="e.g. Samsung Galaxy A54">
            </div>
            
            <div class="form-group">
                <label>Category *</label>
                <select id="categoryId"><option value="">Loading categories...</option></select>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Describe your product..."></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Price (XAF) *</label>
                    <input type="number" id="price" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Discounted Price (XAF)</label>
                    <input type="number" id="discountedPrice" placeholder="Optional">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="quantity" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>Condition *</label>
                    <select id="condition">
                        <option value="NEW">NEW</option>
                        <option value="LIKE_NEW">LIKE NEW</option>
                        <option value="USED">USED</option>
                        <option value="REFURBISHED">REFURBISHED</option>
                    </select>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="createProduct()">🚀 Create Product</button>
            <div id="message" class="message"></div>
        </div>
    </main>

    <script>
        var token = localStorage.getItem('token') || sessionStorage.getItem('token');
        if (!token) { window.location.href = '/dashboard'; }
        
        async function loadCategories() {
            try {
                var res = await fetch('/api/categories');
                var data = await res.json();
                var select = document.getElementById('categoryId');
                if (data.success && data.data) {
                    select.innerHTML = '<option value="">-- Select category --</option>' +
                        data.data.map(function(c) { return '<option value="' + c.id + '">' + c.nameEn + '</option>'; }).join('');
                }
            } catch(e) {}
        }
        
        async function createProduct() {
            var name = document.getElementById('name').value.trim();
            var categoryId = document.getElementById('categoryId').value;
            var description = document.getElementById('description').value.trim();
            var price = document.getElementById('price').value;
            var discountedPrice = document.getElementById('discountedPrice').value;
            var quantity = document.getElementById('quantity').value;
            var condition = document.getElementById('condition').value;
            var msg = document.getElementById('message');
            var btn = document.querySelector('.btn-primary');
            
            if (!name || !categoryId || !price || !quantity) {
                msg.textContent = '❌ Please fill in all required fields.';
                msg.className = 'message error';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Creating...';
            msg.className = 'message';
            
            var body = {
                name: name,
                categoryId: parseInt(categoryId),
                description: description,
                price: parseFloat(price),
                quantity: parseInt(quantity),
                condition: condition
            };
            if (discountedPrice) body.discountedPrice = parseFloat(discountedPrice);
            
            try {
                var res = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(body)
                });
                var data = await res.json();
                
                if (data.success) {
                    msg.textContent = '✅ Product created! Redirecting...';
                    msg.className = 'message success';
                    setTimeout(function() { window.location.href = '/product?id=' + data.data.id; }, 1500);
                } else {
                    msg.textContent = '❌ ' + (data.message || 'Failed to create product.');
                    msg.className = 'message error';
                    btn.disabled = false;
                    btn.textContent = '🚀 Create Product';
                }
            } catch(e) {
                msg.textContent = '❌ Network error.';
                msg.className = 'message error';
                btn.disabled = false;
                btn.textContent = '🚀 Create Product';
            }
        }
        
        loadCategories();
    </script>
</body>
</html>
