<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Images | CamBiz Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f6fa; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #2d3436, #636e72); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header .logo { font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none; }
        .header nav a { color: white; text-decoration: none; margin-left: 1.5rem; }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1.5rem; }
        .back-btn { color: #0984e3; text-decoration: none; margin-bottom: 1.5rem; display: inline-block; }
        .upload-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .upload-card h1 { color: #2d3436; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #2d3436; font-weight: 600; }
        .form-group select { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 14px; }
        .drop-zone { border: 3px dashed #dfe6e9; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s; }
        .drop-zone:hover { border-color: #667eea; background: #f8f9ff; }
        .drop-zone .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .drop-zone p { color: #636e72; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 1rem; }
        .preview-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-item .remove { position: absolute; top: 4px; right: 4px; background: #ff6b6b; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; line-height: 1; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #0984e3; color: white; width: 100%; }
        .btn-primary:disabled { background: #b2bec3; cursor: not-allowed; }
        .message { margin-top: 1rem; padding: 0.75rem; border-radius: 10px; display: none; text-align: center; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <header class="header">
        <a href="/store" class="logo">🛒 CamBiz Market</a>
        <nav><a href="/store">📦 Products</a><a href="/dashboard">👤 Dashboard</a></nav>
    </header>
    <main class="container">
        <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
        <div class="upload-card">
            <h1>📷 Upload Product Images</h1>
            <div class="form-group">
                <label>Select Product</label>
                <select id="productSelect"><option value="">Loading...</option></select>
            </div>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="icon">📁</div>
                <p>Click or drag images here</p>
                <p style="font-size:0.8rem;color:#b2bec3;">Max 8 images, 10MB each</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="handleFiles(this.files)">
            <div class="preview-grid" id="previewGrid"></div>
            <button class="btn btn-primary" id="uploadBtn" onclick="uploadImages()" disabled>📤 Upload Images</button>
            <div id="message" class="message"></div>
        </div>
    </main>
    <script>
        var token = localStorage.getItem('token') || sessionStorage.getItem('token');
        var selectedFiles = [];
        if (!token) { window.location.href = '/dashboard'; }
        async function loadMyProducts() {
            try {
                var res = await fetch('/api/products/my-products', { headers: { 'Authorization': 'Bearer ' + token } });
                var data = await res.json();
                var select = document.getElementById('productSelect');
                if (data.success && data.data && data.data.length > 0) {
                    select.innerHTML = '<option value="">-- Select a product --</option>' +
                        data.data.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
                } else {
                    select.innerHTML = '<option value="">No products found</option>';
                }
            } catch(e) {}
        }
        function handleFiles(files) {
            selectedFiles = Array.from(files).slice(0, 8);
            renderPreviews();
            document.getElementById('uploadBtn').disabled = selectedFiles.length === 0 || !document.getElementById('productSelect').value;
        }
        function renderPreviews() {
            var grid = document.getElementById('previewGrid');
            grid.innerHTML = selectedFiles.map(function(file, i) {
                return '<div class="preview-item"><img src="' + URL.createObjectURL(file) + '" alt="Preview"><button class="remove" onclick="removeFile(' + i + ')">✕</button></div>';
            }).join('');
        }
        function removeFile(index) { selectedFiles.splice(index, 1); renderPreviews(); document.getElementById('uploadBtn').disabled = selectedFiles.length === 0 || !document.getElementById('productSelect').value; }
        document.getElementById('productSelect').addEventListener('change', function() { document.getElementById('uploadBtn').disabled = selectedFiles.length === 0 || !this.value; });
        var dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.style.borderColor = '#667eea'; });
        dropZone.addEventListener('dragleave', function() { dropZone.style.borderColor = '#dfe6e9'; });
        dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.style.borderColor = '#dfe6e9'; handleFiles(e.dataTransfer.files); });
        async function uploadImages() {
            var productId = document.getElementById('productSelect').value;
            if (!productId || selectedFiles.length === 0) return;
            var btn = document.getElementById('uploadBtn');
            var msg = document.getElementById('message');
            btn.disabled = true; btn.textContent = 'Uploading...'; msg.className = 'message';
            var formData = new FormData();
            selectedFiles.forEach(function(file) { formData.append('files', file); });
            try {
                var res = await fetch('/api/products/' + productId + '/images', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: formData });
                var data = await res.json();
                if (data.success) {
                    msg.textContent = 'Images uploaded successfully!';
                    msg.className = 'message success';
                    selectedFiles = []; renderPreviews(); btn.disabled = true;
                } else {
                    msg.textContent = data.message || 'Upload failed';
                    msg.className = 'message error';
                }
            } catch(e) { msg.textContent = 'Network error'; msg.className = 'message error'; }
            btn.disabled = false; btn.textContent = 'Upload Images';
        }
        loadMyProducts();
    </script>
</body>
</html>
