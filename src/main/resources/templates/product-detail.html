<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamBiz Market | Product Details</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f5f5; }
        .navbar { background: #2563eb; padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #2563eb; text-decoration: none; font-weight: 600; cursor: pointer; }
        .back-btn:hover { text-decoration: underline; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .product-image-main { width: 100%; height: 400px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image-main img { width: 100%; height: 100%; object-fit: contain; }
        .product-image-main .emoji { font-size: 120px; }
        .product-details { padding: 30px; }
        .product-category { font-size: 12px; color: #2563eb; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .product-name { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .product-description { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .price-section { background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .product-price { font-size: 32px; font-weight: bold; color: #2563eb; }
        .product-price .original { font-size: 18px; color: #999; text-decoration: line-through; margin-right: 10px; }
        .product-price .discount-badge { font-size: 14px; background: #ef4444; color: white; padding: 5px 12px; border-radius: 15px; margin-left: 10px; }
        .product-stock { font-size: 14px; color: #10b981; margin-top: 5px; }
        .product-condition { font-size: 12px; color: #f59e0b; margin-top: 3px; }
        .seller-info { background: #f0f4ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .seller-name { font-weight: bold; color: #333; }
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px 20px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; display: inline-block; transition: transform 0.1s; }
        .btn:hover { transform: scale(1.02); }
        .btn-buy { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; }
        .btn-cart { background: #10b981; color: white; }
        .btn-makola { background: #ef4444; color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-feature { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-upload { background: #6366f1; color: white; }
        .review-section { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .review-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .loading { text-align: center; padding: 60px; font-size: 18px; color: #666; }
        .error { text-align: center; padding: 60px; color: #ef4444; font-size: 18px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; border-radius: 16px; padding: 2rem; max-width: 450px; width: 90%; text-align: center; }
        .modal-option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .modal-cancel { padding: 10px 20px; background: #b2bec3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        @media (max-width: 600px) { .product-name { font-size: 22px; } .product-price { font-size: 24px; } .action-buttons { grid-template-columns: 1fr; } .product-image-main { height: 250px; } }
    </style>
</head>
<body>
    <div class="navbar"><a href="/store">🛒 CamBiz Market</a><span style="color:white;">Product Details</span></div>
    <div class="container">
        <a href="javascript:history.back()" class="back-btn">← Go Back</a>
        <div id="productDetail"><div class="loading">Loading product...</div></div>
    </div>
    <div class="modal-overlay" id="featureModal">
        <div class="modal-box">
            <h2>⭐ Feature Your Product</h2><p>Get more visibility!</p>
            <button class="modal-option" style="background:#2563eb;" onclick="featureProduct('1week')">📅 1 Week — 5,000 XAF</button>
            <button class="modal-option" style="background:#1d4ed8;" onclick="featureProduct('1month')">📅 1 Month — 18,000 XAF</button>
            <button class="modal-option" style="background:#ef4444;" onclick="featureProduct('3months')">📅 3 Months — 50,000 XAF</button>
            <p id="featureMsg" style="margin:10px 0;"></p>
            <button class="modal-cancel" onclick="closeFeatureModal()">Cancel</button>
        </div>
    </div>

    <script>
        const categoryEmojis={'Smartphones & Tablets':'📱','Laptops & Computers':'💻','Electronics & Audio':'🎧','Home Appliances':'🏠','Fashion & Clothing':'👗','Food & Essentials':'🍚','Transportation':'🏍️','Accessories':'⌚','Sports and Fitness':'⚽','Books and Stationery':'📚','Jewelry and Watches':'💍','Toys and Games':'🎮','Pet Supplies':'🐾','Beauty and Personal Care':'💄','Baby and Kids':'👶','Health and Medical':'🏥','Agriculture and Farming':'🌾','Building and Construction':'🏗️','Auto and Spare Parts':'🔧','Services and Repairs':'🛠️'};
        var currentFeatureProductId=null;
        function getProductImageHTML(p){if(p.imageUrls&&p.imageUrls.length>0)return'<img src="'+p.imageUrls[0]+'" alt="'+p.name+'">';return'<span class="emoji">'+(categoryEmojis[p.categoryName]||'📦')+'</span>';}
        async function loadProduct(){var u=new URLSearchParams(window.location.search);var id=u.get('id');if(!id){document.getElementById('productDetail').innerHTML='<div class="error">No product specified</div>';return;}try{var r=await fetch('/api/products/'+id);var d=await r.json();if(d.success&&d.data){var p=d.data;var pr=p.discountedPrice||p.price;var hd=p.discountedPrice&&p.discountedPrice<p.price;var su='https://cambiz-market.onrender.com/product?id='+p.id;var st='🛍️ '+p.name+' - '+pr.toLocaleString()+' XAF on CamBiz Market! '+su;document.getElementById('productDetail').innerHTML='<div class="product-card"><div class="product-image-main">'+getProductImageHTML(p)+'</div><div class="product-details"><div class="product-category">'+(p.categoryName||'General')+'</div><div class="product-name">'+p.name+'</div><div class="product-description">'+(p.description||'No description')+'</div><div class="price-section"><div class="product-price">'+(hd?'<span class="original">'+p.price.toLocaleString()+' XAF</span>':'')+pr.toLocaleString()+' XAF'+(hd?'<span class="discount-badge">-'+Math.round((1-p.discountedPrice/p.price)*100)+'%</span>':'')+'</div><div class="product-stock">✅ '+(p.stockQuantity>0?'In Stock ('+p.stockQuantity+' available)':'Out of Stock')+'</div><div class="product-condition">🏷️ Condition: '+(p.condition||'NEW')+'</div></div>'+(p.sellerName?'<div class="seller-info"><span class="seller-name">🏪 Seller: '+p.sellerName+'</span>'+(p.sellerBusinessName?'<br>'+p.sellerBusinessName:'')+'</div>':'')+'<div class="action-buttons"><button class="btn btn-cart" onclick="addToCart('+p.id+')">🛒 Add to Cart</button><button class="btn btn-buy" onclick="buyNow('+p.id+')">⚡ Buy Now</button><button class="btn btn-makola" onclick="makeOffer('+p.id+')">💰 Make Offer</button><button class="btn btn-feature" onclick="showFeatureModal('+p.id+')">⭐ Feature</button><button class="btn btn-upload" onclick="window.location.href=\'/create-product\'">📷 Add Images</button><a href="https://wa.me/?text='+encodeURIComponent(st)+'" target="_blank" class="btn btn-whatsapp">📱 WhatsApp</a></div><div class="review-section"><h3 style="margin-bottom:10px;">⭐ Reviews</h3><div id="reviews-'+p.id+'">Loading...</div><div style="margin-top:15px;padding:15px;background:#f8f9fa;border-radius:10px;"><select id="reviewRating-'+p.id+'" style="padding:5px;border-radius:5px;margin-bottom:8px;"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select><textarea id="reviewComment-'+p.id+'" placeholder="Your review..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #dfe6e9;margin-bottom:8px;min-height:50px;"></textarea><button onclick="submitReview('+p.id+')" style="padding:10px 20px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;">Submit</button><p id="reviewMsg-'+p.id+'" style="margin-top:5px;"></p></div></div></div></div>';setTimeout(function(){loadReviews(p.id);},300);}else{document.getElementById('productDetail').innerHTML='<div class="error">Product not found</div>';}}catch(e){document.getElementById('productDetail').innerHTML='<div class="error">Failed to load</div>';}}
        function getToken(){return localStorage.getItem('token')||sessionStorage.getItem('token');}
        async function addToCart(id){var t=getToken();if(!t){alert('Login first');return;}try{var r=await fetch('/api/cart/add/'+id+'?quantity=1',{method:'POST',headers:{'Authorization':'Bearer '+t}});var d=await r.json();alert(d.success?'✅ Added to cart!':d.message||'Failed');}catch(e){alert('Error');}}
        async function buyNow(id){var t=getToken();if(!t){alert('Login first');return;}try{await fetch('/api/cart/add/'+id+'?quantity=1',{method:'POST',headers:{'Authorization':'Bearer '+t}});var r=await fetch('/api/orders/checkout',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({paymentMethod:'MTN_MONEY'})});var d=await r.json();if(d.success){alert('✅ Order #'+d.data.orderNumber);window.location.href='/order-tracking?id='+d.data.orderId;}else{alert('❌ '+(d.message||'Failed'));}}catch(e){alert('Error');}}
        async function makeOffer(id){var t=getToken();if(!t){alert('Login first');return;}var o=prompt('Amount (XAF):');if(o&&!isNaN(o)&&parseFloat(o)>0){try{var r=await fetch('/api/makola/offer',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({productId:id,offerAmount:parseFloat(o),message:'Offer'})});var d=await r.json();alert(d.message||'✅ Submitted!');}catch(e){alert('Error');}}else{alert('Valid amount required');}}
        function showFeatureModal(id){currentFeatureProductId=id;document.getElementById('featureModal').style.display='flex';}
        function closeFeatureModal(){document.getElementById('featureModal').style.display='none';document.getElementById('featureMsg').textContent='';}
        async function featureProduct(dur){var t=getToken();if(!t){document.getElementById('featureMsg').textContent='❌ Login first';return;}document.getElementById('featureMsg').textContent='⏳...';try{var r=await fetch('/api/featured/boost',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({productId:currentFeatureProductId,sellerId:1,duration:dur})});var d=await r.json();if(d.success){document.getElementById('featureMsg').textContent='✅ Pay via '+d.data.ussdCode;setTimeout(closeFeatureModal,2500);}else{document.getElementById('featureMsg').textContent='❌ '+(d.message||'Failed');}}catch(e){document.getElementById('featureMsg').textContent='❌ Error';}}
        async function submitReview(pid){var t=getToken();if(!t){alert('Login first');return;}var r=document.getElementById('reviewRating-'+pid).value;var c=document.getElementById('reviewComment-'+pid).value;var m=document.getElementById('reviewMsg-'+pid);m.textContent='...';try{var res=await fetch('/api/reviews',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({productId:pid,rating:parseInt(r),comment:c})});var d=await res.json();if(d.success){m.textContent='✅ Done!';document.getElementById('reviewComment-'+pid).value='';loadReviews(pid);}else{m.textContent=d.message||'Failed';}}catch(e){m.textContent='Error';}}
        async function loadReviews(pid){try{var r=await fetch('/api/reviews/product/'+pid);var d=await r.json();var c=document.getElementById('reviews-'+pid);if(d.success&&d.data&&d.data.reviews&&d.data.reviews.length>0){var h='';for(var i=0;i<d.data.reviews.length;i++){var rev=d.data.reviews[i];h+='<div class="review-item"><strong>'+'⭐'.repeat(rev.rating)+'</strong> '+(rev.comment||'')+' <small>- '+rev.userName+'</small></div>';}if(d.data.stats)h+='<div style="margin-top:5px;color:#666;font-size:0.85rem;">'+d.data.stats.averageRating+' avg ('+d.data.stats.totalReviews+' reviews)</div>';c.innerHTML=h;}else{c.innerHTML='<p style="color:#999;">No reviews yet.</p>';}}catch(e){}}
        loadProduct();
    </script>
</body>
</html>
