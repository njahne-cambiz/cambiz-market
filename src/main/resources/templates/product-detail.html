<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamBiz Market | Product Details</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #667eea; text-decoration: none; font-weight: 500; }
        .product-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .product-emoji { font-size: 80px; text-align: center; margin-bottom: 20px; }
        .product-category { font-size: 12px; color: #667eea; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .product-name { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .product-description { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .price-section { background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .product-price { font-size: 32px; font-weight: bold; color: #667eea; }
        .product-price .original { font-size: 18px; color: #999; text-decoration: line-through; margin-right: 10px; }
        .product-price .discount-badge { font-size: 14px; background: #ff6b6b; color: white; padding: 5px 12px; border-radius: 15px; margin-left: 10px; }
        .product-stock { font-size: 14px; color: #10b981; margin-top: 5px; }
        .product-condition { font-size: 12px; color: #f59e0b; margin-top: 3px; }
        .seller-info { background: #f0f4ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .seller-name { font-weight: bold; color: #333; }
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px 20px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; display: inline-block; transition: transform 0.1s, opacity 0.2s; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn-buy { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-cart { background: #10b981; color: white; }
        .btn-makola { background: #ff6b6b; color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-feature { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .loading { text-align: center; padding: 60px; font-size: 18px; color: #666; }
        .error { text-align: center; padding: 60px; color: #ff6b6b; font-size: 18px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; border-radius: 16px; padding: 2rem; max-width: 450px; width: 90%; text-align: center; }
        .modal-box h2 { color: #2d3436; margin-bottom: 0.5rem; }
        .modal-box p { color: #636e72; margin: 1rem 0; }
        .modal-option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .modal-cancel { padding: 10px 20px; background: #b2bec3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        @media (max-width: 600px) {
            .product-name { font-size: 22px; }
            .product-price { font-size: 24px; }
            .action-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/store">🛒 CamBiz Market</a>
        <span>Product Details</span>
    </div>

    <div class="container">
        <a href="/store" class="back-btn">← Back to Store</a>
        <div id="productDetail">
            <div class="loading">Loading product...</div>
        </div>
    </div>

    <!-- Feature Modal -->
    <div class="modal-overlay" id="featureModal">
        <div class="modal-box">
            <h2>⭐ Feature Your Product</h2>
            <p>Get more visibility! Featured products appear at the top of the store.</p>
            <button class="modal-option" style="background:#667eea;" onclick="featureProduct('1week')">📅 1 Week — 5,000 XAF</button>
            <button class="modal-option" style="background:#764ba2;" onclick="featureProduct('1month')">📅 1 Month — 18,000 XAF</button>
            <button class="modal-option" style="background:#ff6b6b;" onclick="featureProduct('3months')">📅 3 Months — 50,000 XAF</button>
            <p id="featureMsg" style="margin:10px 0; min-height:20px;"></p>
            <button class="modal-cancel" onclick="closeFeatureModal()">Cancel</button>
        </div>
    </div>

    <script>
        const categoryEmojis = {
            'Smartphones & Tablets': '📱', 'Laptops & Computers': '💻',
            'Electronics & Audio': '🎧', 'Home Appliances': '🏠',
            'Fashion & Clothing': '👗', 'Food & Essentials': '🍚',
            'Transportation': '🏍️', 'Accessories': '⌚'
        };
        
        let currentFeatureProductId = null;

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (!productId) {
                document.getElementById('productDetail').innerHTML = '<div class="error">No product specified</div>';
                return;
            }

            try {
                const res = await fetch(`/api/products/${productId}`);
                const data = await res.json();
                
                if (data.success && data.data) {
                    const p = data.data;
                    const emoji = categoryEmojis[p.categoryName] || '📦';
                    const price = p.discountedPrice || p.price;
                    const hasDiscount = p.discountedPrice && p.discountedPrice < p.price;
                    const shareUrl = `https://cambiz-market.onrender.com/product?id=${p.id}`;
                    const shareText = `🛍️ ${p.name} - ${price.toLocaleString()} XAF on CamBiz Market! ${shareUrl}`;
                    
                    document.getElementById('productDetail').innerHTML = `
                        <div class="product-card">
                            <div class="product-emoji">${emoji}</div>
                            <div class="product-category">${p.categoryName || 'General'}</div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-description">${p.description || 'No description available.'}</div>
                            
                            <div class="price-section">
                                <div class="product-price">
                                    ${hasDiscount ? `<span class="original">${p.price.toLocaleString()} XAF</span>` : ''}
                                    ${price.toLocaleString()} XAF
                                    ${hasDiscount ? `<span class="discount-badge">-${Math.round((1 - p.discountedPrice/p.price) * 100)}%</span>` : ''}
                                </div>
                                <div class="product-stock">✅ ${p.stockQuantity > 0 ? 'In Stock' : 'Out of Stock'} (${p.stockQuantity} available)</div>
                                <div class="product-condition">🏷️ Condition: ${p.condition || 'NEW'}</div>
                            </div>
                            
                            ${p.sellerName ? `
                            <div class="seller-info">
                                <span class="seller-name">🏪 Seller: ${p.sellerName}</span>
                                ${p.sellerBusinessName ? `<br>${p.sellerBusinessName}` : ''}
                            </div>` : ''}
                            
                            <div class="action-buttons">
                                <button class="btn btn-cart" onclick="addToCart(${p.id})">🛒 Add to Cart</button>
                                <button class="btn btn-buy" onclick="buyNow(${p.id})">⚡ Buy Now</button>
                                <button class="btn btn-makola" onclick="makeOffer(${p.id})">💰 Make Offer</button>
                                <button class="btn btn-feature" id="featureBtn" onclick="showFeatureModal(${p.id})">⭐ Feature Product</button>
                                <a href="https://wa.me/?text=${encodeURIComponent(shareText)}" target="_blank" class="btn btn-whatsapp">📱 Share on WhatsApp</a>
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('productDetail').innerHTML = '<div class="error">Product not found</div>';
                }
            } catch (e) {
                document.getElementById('productDetail').innerHTML = '<div class="error">Failed to load product</div>';
            }
        }

        function getToken() {
            return localStorage.getItem('token') || sessionStorage.getItem('token');
        }

        function requireToken(callback) {
            let token = getToken();
            if (token) {
                callback(token);
            } else {
                token = prompt("Please login first. Enter your JWT token:");
                if (token) {
                    localStorage.setItem('token', token);
                    callback(token);
                } else {
                    alert("Token required to continue.");
                }
            }
        }

        async function addToCart(id) {
            requireToken(async (token) => {
                try {
                    const res = await fetch(`/api/cart/add/${id}?quantity=1`, {
                        method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const d = await res.json();
                    alert(d.message || 'Added to cart!');
                } catch (e) { alert('Failed to add to cart.'); }
            });
        }

        async function buyNow(id) {
            requireToken(async (token) => {
                try {
                    await fetch(`/api/cart/add/${id}?quantity=1`, {
                        method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                    });
                    window.location.href = '/cart';
                } catch (e) { alert('Failed to process.'); }
            });
        }

        async function makeOffer(id) {
            requireToken(async (token) => {
                const offer = prompt("Enter your offer amount (XAF):");
                if (offer) {
                    try {
                        const res = await fetch('/api/makola/offer', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ productId: id, offerAmount: parseFloat(offer), message: "Offer from product page" })
                        });
                        const d = await res.json();
                        alert(d.message || 'Offer submitted!');
                    } catch (e) { alert('Failed to submit offer.'); }
                }
            });
        }

        // Feature Product Functions
        function showFeatureModal(productId) {
            currentFeatureProductId = productId;
            document.getElementById('featureModal').style.display = 'flex';
        }

        function closeFeatureModal() {
            document.getElementById('featureModal').style.display = 'none';
            document.getElementById('featureMsg').textContent = '';
        }

        async function featureProduct(duration) {
            const token = getToken();
            if (!token) {
                document.getElementById('featureMsg').textContent = '❌ Please log in first.';
                return;
            }
            
            document.getElementById('featureMsg').textContent = '⏳ Processing...';
            
            try {
                const res = await fetch('/api/featured/boost', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ productId: currentFeatureProductId, sellerId: 1, duration: duration })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('featureMsg').textContent = '✅ Featured! Pay via ' + data.data.ussdCode;
                    setTimeout(closeFeatureModal, 2500);
                } else {
                    document.getElementById('featureMsg').textContent = '❌ ' + (data.message || 'Failed.');
                }
            } catch(e) {
                document.getElementById('featureMsg').textContent = '❌ Network error.';
            }
        }

        loadProduct();
    </script>
</body>
</html>
