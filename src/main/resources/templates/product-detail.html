<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamBiz Market | Product Details</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #eaeded; }
        .navbar { background: #131921; padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .navbar .logo span { color: #febd69; }
        .navbar .cart-link { color: white; text-decoration: none; font-size: 14px; font-weight: 700; }
        .navbar .cart-count { background: #febd69; color: #131921; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .back-btn { display: inline-block; margin-bottom: 15px; color: #2563eb; text-decoration: none; font-weight: 600; cursor: pointer; }
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .product-image-main { width: 100%; height: 400px; background: #f7f7f7; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image-main img { width: 100%; height: 100%; object-fit: contain; }
        .product-image-main .emoji { font-size: 120px; }
        .product-details { padding: 25px 30px; }
        .product-category { font-size: 12px; color: #2563eb; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .product-name { font-size: 24px; font-weight: 700; color: #0f1111; margin-bottom: 8px; }
        .product-description { color: #565959; margin-bottom: 20px; line-height: 1.5; font-size: 14px; }
        .price-section { background: #fefaf3; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #febd69; }
        .product-price { font-size: 28px; font-weight: 700; color: #0f1111; }
        .product-price .original { font-size: 16px; color: #565959; text-decoration: line-through; margin-right: 8px; }
        .product-price .discount-badge { font-size: 13px; background: #d00; color: white; padding: 4px 10px; border-radius: 4px; margin-left: 10px; }
        .product-stock { font-size: 14px; color: #10b981; margin-top: 5px; font-weight: 500; }
        .product-condition { font-size: 12px; color: #565959; margin-top: 3px; }
        .seller-info { background: #f0f4ff; padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .seller-name { font-weight: 600; color: #0f1111; }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .btn { padding: 14px 20px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; display: block; transition: all 0.15s; }
        .btn:hover { transform: translateY(-1px); }
        .btn-cart { background: #ffd814; color: #0f1111; font-size: 16px; padding: 16px; }
        .btn-cart:hover { background: #f7ca00; }
        .btn-makola { background: #fff; color: #d00; border: 1px solid #d00; font-size: 13px; padding: 10px; }
        .btn-whatsapp { background: #25D366; color: white; font-size: 13px; padding: 10px; }
        .btn-feature { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; font-size: 13px; padding: 10px; }
        .btn-edit { background: #2563eb; color: white; font-size: 13px; padding: 10px; }
        .secondary-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .review-section { margin-top: 20px; border-top: 1px solid #e8ecf1; padding-top: 15px; }
        .review-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .loading { text-align: center; padding: 60px; color: #565959; }
        .error { text-align: center; padding: 60px; color: #d00; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; border-radius: 12px; padding: 2rem; max-width: 450px; width: 90%; text-align: center; }
        .modal-option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .modal-cancel { padding: 10px 20px; background: #b2bec3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 8px; }
        
        /* Toast Notification */
        .toast { position: fixed; top: 20px; right: 20px; background: #10b981; color: white; padding: 16px 24px; border-radius: 8px; font-weight: 600; font-size: 15px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.2); transform: translateX(120%); transition: transform 0.3s ease; display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateX(0); }
        .toast .icon { font-size: 1.3rem; }
        .toast .close-toast { margin-left: 15px; cursor: pointer; opacity: 0.7; }
        .toast .close-toast:hover { opacity: 1; }
        
        @media (max-width: 600px) { .product-name { font-size: 20px; } .product-price { font-size: 24px; } .product-image-main { height: 250px; } .secondary-actions { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/store"><span class="logo">cam<span>Biz</span> Market</span></a>
        <a href="/cart" class="cart-link">🛒 Cart <span class="cart-count" id="navCartCount">0</span></a>
    </div>
    
    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="icon">✅</span>
        <span id="toastMsg">Added to cart!</span>
        <span class="close-toast" onclick="hideToast()">✕</span>
    </div>
    
    <div class="container">
        <a href="javascript:history.back()" class="back-btn">← Go Back</a>
        <div id="productDetail"><div class="loading">Loading product...</div></div>
    </div>
    <div class="modal-overlay" id="featureModal">
        <div class="modal-box"><h2>⭐ Feature Your Product</h2><p>Get more visibility!</p>
            <button class="modal-option" style="background:#2563eb;" onclick="featureProduct('1week')">📅 1 Week — 5,000 XAF</button>
            <button class="modal-option" style="background:#1d4ed8;" onclick="featureProduct('1month')">📅 1 Month — 18,000 XAF</button>
            <button class="modal-option" style="background:#d00;" onclick="featureProduct('3months')">📅 3 Months — 50,000 XAF</button>
            <p id="featureMsg" style="margin:10px 0;"></p><button class="modal-cancel" onclick="closeFeatureModal()">Cancel</button>
        </div>
    </div>
    <script>
        var currentUserType='BUYER';
        var token=localStorage.getItem('token')||sessionStorage.getItem('token');
        if(token){try{var payload=JSON.parse(atob(token.split('.')[1]));var roles=payload.roles||[];if(Array.isArray(roles)&&roles.indexOf('ROLE_SELLER')!==-1)currentUserType='SELLER';else if(payload.userType==='SELLER')currentUserType='SELLER';}catch(e){}}
        
        function showToast(msg, icon) {
            document.getElementById('toastMsg').textContent = msg;
            document.getElementById('toast').querySelector('.icon').textContent = icon || '✅';
            document.getElementById('toast').classList.add('show');
            setTimeout(hideToast, 3000);
        }
        function hideToast() { document.getElementById('toast').classList.remove('show'); }
        
        const categoryEmojis={'Smartphones & Tablets':'📱','Laptops & Computers':'💻','Electronics & Audio':'🎧','Home Appliances':'🏠','Fashion & Clothing':'👗','Food & Essentials':'🍚','Transportation':'🏍️','Accessories':'⌚','Sports and Fitness':'⚽','Books and Stationery':'📚','Jewelry and Watches':'💍','Toys and Games':'🎮','Pet Supplies':'🐾','Beauty and Personal Care':'💄','Baby and Kids':'👶','Health and Medical':'🏥','Agriculture and Farming':'🌾','Building and Construction':'🏗️','Auto and Spare Parts':'🔧','Services and Repairs':'🛠️'};
        var currentFeatureProductId=null;
        function getProductImageHTML(p){if(p.imageUrls&&p.imageUrls.length>0)return'<img src="'+p.imageUrls[0]+'" alt="'+p.name+'">';return'<span class="emoji">'+(categoryEmojis[p.categoryName]||'📦')+'</span>';}
        async function loadProduct(){
            var u=new URLSearchParams(window.location.search);var id=u.get('id');if(!id){document.getElementById('productDetail').innerHTML='<div class="error">No product specified</div>';return;}
            try{var r=await fetch('/api/products/'+id);var d=await r.json();
                if(d.success&&d.data){var p=d.data;var pr=p.discountedPrice||p.price;var hd=p.discountedPrice&&p.discountedPrice<p.price;
                    var su='https://cambiz-market.onrender.com/product?id='+p.id;var st='🛍️ '+p.name+' - '+pr.toLocaleString()+' XAF on CamBiz Market! '+su;
                    var isOwner=currentUserType==='SELLER';
                    var actions=isOwner?
                        '<div class="action-buttons"><button class="btn btn-edit" onclick="window.location.href=\'/create-product\'">✏️ Edit Product</button></div><div class="secondary-actions"><button class="btn btn-feature" onclick="showFeatureModal('+p.id+')">⭐ Feature</button><a href="https://wa.me/?text='+encodeURIComponent(st)+'" target="_blank" class="btn btn-whatsapp">📱 WhatsApp</a></div>'
                        :
                        '<div class="action-buttons"><button class="btn btn-cart" onclick="addToCart('+p.id+')">🛒 Add to Cart</button></div><div class="secondary-actions"><button class="btn btn-makola" onclick="makeOffer('+p.id+')">💰 Make Offer</button><button class="btn btn-feature" onclick="showFeatureModal('+p.id+')">⭐ Feature</button><a href="https://wa.me/?text='+encodeURIComponent(st)+'" target="_blank" class="btn btn-whatsapp">📱 WhatsApp</a></div>';
                    
                    document.getElementById('productDetail').innerHTML='<div class="product-card"><div class="product-image-main">'+getProductImageHTML(p)+'</div><div class="product-details"><div class="product-category">'+(p.categoryName||'General')+'</div><div class="product-name">'+p.name+'</div><div class="product-description">'+(p.description||'No description')+'</div><div class="price-section"><div class="product-price">'+(hd?'<span class="original">'+p.price.toLocaleString()+' XAF</span>':'')+pr.toLocaleString()+' XAF'+(hd?'<span class="discount-badge">-'+Math.round((1-p.discountedPrice/p.price)*100)+'%</span>':'')+'</div><div class="product-stock">✅ '+(p.stockQuantity>0?'In Stock ('+p.stockQuantity+' available)':'Out of Stock')+'</div><div class="product-condition">🏷️ Condition: '+(p.condition||'NEW')+'</div></div>'+(p.sellerName?'<div class="seller-info"><span class="seller-name">🏪 Seller: '+p.sellerName+'</span>'+(p.sellerBusinessName?'<br>'+p.sellerBusinessName:'')+'</div>':'')+actions+'<div class="review-section"><h3>⭐ Reviews</h3><div id="reviews-'+p.id+'">Loading...</div><div style="margin-top:15px;padding:15px;background:#f8f9fa;border-radius:8px;"><select id="reviewRating-'+p.id+'" style="padding:5px;border-radius:4px;margin-bottom:8px;"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select><textarea id="reviewComment-'+p.id+'" placeholder="Your review..." style="width:100%;padding:8px;border-radius:4px;border:1px solid #d5d9d9;margin-bottom:8px;min-height:45px;"></textarea><button onclick="submitReview('+p.id+')" style="padding:8px 20px;background:#ffd814;color:#0f1111;border:none;border-radius:4px;cursor:pointer;font-weight:600;">Submit Review</button><p id="reviewMsg-'+p.id+'" style="margin-top:5px;"></p></div></div></div></div>';
                    setTimeout(function(){loadReviews(p.id);},300);
                }else{document.getElementById('productDetail').innerHTML='<div class="error">Product not found</div>';}
            }catch(e){document.getElementById('productDetail').innerHTML='<div class="error">Failed to load</div>';}
            loadCartCount();
        }
        async function loadCartCount(){var t=getToken();if(!t)return;try{var r=await fetch('/api/cart',{headers:{'Authorization':'Bearer '+t}});var d=await r.json();if(d.success&&d.data&&d.data.items)document.getElementById('navCartCount').textContent=d.data.items.length;}catch(e){}}
        function getToken(){return localStorage.getItem('token')||sessionStorage.getItem('token');}
        async function addToCart(id){var t=getToken();if(!t){showToast('Please login first','🔐');return;}try{var r=await fetch('/api/cart/add/'+id+'?quantity=1',{method:'POST',headers:{'Authorization':'Bearer '+t}});var d=await r.json();if(d.success){loadCartCount();showToast('Added to cart! View cart to checkout','🛒');}else{showToast(d.message||'Failed','❌');}}catch(e){showToast('Network error','❌');}}
        async function makeOffer(id){var t=getToken();if(!t){showToast('Please login first','🔐');return;}var o=prompt('Enter your offer amount (XAF):');if(o&&!isNaN(o)&&parseFloat(o)>0){try{var r=await fetch('/api/makola/offer',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({productId:id,offerAmount:parseFloat(o),message:'Offer from product page'})});var d=await r.json();showToast(d.message||'✅ Offer submitted!','💰');}catch(e){showToast('Error','❌');}}else{showToast('Please enter a valid amount','⚠️');}}
        function showFeatureModal(id){currentFeatureProductId=id;document.getElementById('featureModal').style.display='flex';}
        function closeFeatureModal(){document.getElementById('featureModal').style.display='none';document.getElementById('featureMsg').textContent='';}
        async function featureProduct(dur){var t=getToken();if(!t){document.getElementById('featureMsg').textContent='❌ Login first';return;}document.getElementById('featureMsg').textContent='⏳...';try{var r=await fetch('/api/featured/boost',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({productId:currentFeatureProductId,sellerId:1,duration:dur})});var d=await r.json();if(d.success){document.getElementById('featureMsg').textContent='✅ Pay via '+d.data.ussdCode;setTimeout(closeFeatureModal,2500);}else{document.getElementById('featureMsg').textContent='❌ '+(d.message||'Failed');}}catch(e){document.getElementById('featureMsg').textContent='❌ Error';}}
        async function submitReview(pid){var t=getToken();if(!t){showToast('Please login first','🔐');return;}var r=document.getElementById('reviewRating-'+pid).value;var c=document.getElementById('reviewComment-'+pid).value;var m=document.getElementById('reviewMsg-'+pid);m.textContent='...';try{var res=await fetch('/api/reviews',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({productId:pid,rating:parseInt(r),comment:c})});var d=await res.json();if(d.success){m.textContent='✅ Done!';document.getElementById('reviewComment-'+pid).value='';loadReviews(pid);}else{m.textContent=d.message||'Failed';}}catch(e){m.textContent='Error';}}
        async function loadReviews(pid){try{var r=await fetch('/api/reviews/product/'+pid);var d=await r.json();var c=document.getElementById('reviews-'+pid);if(d.success&&d.data&&d.data.reviews&&d.data.reviews.length>0){var h='';for(var i=0;i<d.data.reviews.length;i++){var rev=d.data.reviews[i];h+='<div class="review-item"><strong>'+'⭐'.repeat(rev.rating)+'</strong> '+(rev.comment||'')+' <small>- '+rev.userName+'</small></div>';}if(d.data.stats)h+='<div style="margin-top:5px;color:#565959;font-size:0.85rem;">'+d.data.stats.averageRating+' avg ('+d.data.stats.totalReviews+' reviews)</div>';c.innerHTML=h;}else{c.innerHTML='<p style="color:#565959;">No reviews yet.</p>';}}catch(e){}}
        loadProduct();
    </script>
</body>
</html>
