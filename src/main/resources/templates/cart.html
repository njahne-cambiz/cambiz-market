<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | CamBiz Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #eaeded; min-height: 100vh; }
        .header { background: #131921; color: white; padding: 1rem 2.5rem; display: flex; justify-content: space-between; align-items: center; }
        .header .logo { font-size: 1.4rem; font-weight: 700; color: white; text-decoration: none; }
        .header .logo span { color: #febd69; }
        .header nav a { color: white; text-decoration: none; margin-left: 2rem; font-size: 0.9rem; }
        .container { max-width: 900px; margin: 1.5rem auto; padding: 0 1.5rem; }
        .back-btn { color: #2563eb; text-decoration: none; margin-bottom: 1rem; display: inline-block; font-weight: 600; }
        .cart-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .cart-card h1 { font-size: 1.5rem; color: #0f1111; margin-bottom: 1rem; }
        .cart-item { display: grid; grid-template-columns: 80px 1fr 120px 80px 40px; gap: 15px; align-items: center; padding: 15px 0; border-bottom: 1px solid #e8ecf1; transition: opacity 0.2s ease; }
        .cart-item-img { width: 80px; height: 80px; background: #f7f7f7; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-radius: 4px; }
        .cart-item .name { font-weight: 600; color: #0f1111; }
        .cart-item .seller { font-size: 0.8rem; color: #565959; }
        .cart-item .price { font-weight: 700; color: #0f1111; }
        .cart-item .qty { text-align: center; color: #565959; }
        .cart-item .remove-btn { background: none; border: none; color: #d00; cursor: pointer; font-size: 1.2rem; }
        .coupon-section { margin: 15px 0; padding: 15px; background: #f8fafc; border-radius: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .coupon-section input { flex: 1; padding: 10px 14px; border: 1px solid #d5d9d9; border-radius: 4px; font-size: 14px; min-width: 150px; }
        .coupon-section input:focus { border-color: #febd69; outline: none; }
        .btn-coupon { padding: 10px 20px; background: #ffd814; color: #0f1111; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .coupon-msg { font-size: 0.85rem; }
        .coupon-msg.success { color: #10b981; }
        .coupon-msg.error { color: #d00; }
        .cart-summary { background: #fefaf3; border: 1px solid #febd69; border-radius: 8px; padding: 20px; margin-top: 20px; }
        .cart-summary .total { font-size: 1.4rem; font-weight: 700; color: #0f1111; }
        .cart-summary .subtotal { color: #565959; font-size: 0.9rem; margin-bottom: 5px; }
        .cart-summary .discount-line { color: #10b981; font-size: 0.9rem; margin-bottom: 5px; }
        .btn { padding: 14px 28px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 15px; width: 100%; }
        .btn-buy { background: #ffd814; color: #0f1111; font-size: 16px; }
        .btn-buy:disabled { background: #d5d9d9; cursor: not-allowed; }
        .empty-cart { text-align: center; padding: 4rem 2rem; }
        .empty-cart .icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-cart a { color: #2563eb; font-weight: 600; }
        .message { margin-top: 1rem; padding: 10px; border-radius: 8px; text-align: center; font-weight: 600; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .footer { text-align: center; padding: 2rem; color: #b2bec3; font-size: 0.85rem; }
        @media (max-width: 600px) { .cart-item { grid-template-columns: 60px 1fr 80px 50px 30px; gap: 8px; font-size: 0.85rem; } }
    </style>
</head>
<body>
    <header class="header">
        <a href="/store" class="logo">cam<span>Biz</span> Market</a>
        <nav><a href="/store">Store</a><a href="/dashboard">Dashboard</a></nav>
    </header>
    <main class="container">
        <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
        <div class="cart-card">
            <h1>🛒 Shopping Cart</h1>
            <div id="cartItems"></div>
            <div id="emptyCart" class="empty-cart"><div class="icon">🛒</div><h2>Your Cart is Empty</h2><p><a href="/store">Browse products</a></p></div>
            
            <div class="coupon-section" id="couponSection" style="display:none;">
                <input type="text" id="couponCode" placeholder="Enter coupon code" style="text-transform:uppercase;">
                <button class="btn-coupon" onclick="applyCoupon()">Apply</button>
                <span class="coupon-msg" id="couponMsg"></span>
            </div>
            
            <div class="cart-summary" id="cartSummary" style="display:none;">
                <p class="subtotal">Subtotal (<span id="itemCount">0</span> items): <span id="subtotalAmount">0 XAF</span></p>
                <p class="discount-line" id="discountLine" style="display:none;">Coupon: -<span id="discountAmount">0</span> XAF</p>
                <p class="total">Total: <span id="cartTotal">0 XAF</span></p>
                <button class="btn btn-buy" id="checkoutBtn" onclick="checkout()">⚡ Buy Now — <span id="checkoutAmount">0 XAF</span></button>
                <div id="message" class="message"></div>
            </div>
        </div>
        <div class="footer"><p>© 2026 CamBiz Market | Built by Mohammad Musa Njahne</p></div>
    </main>

    <script>
        var token = localStorage.getItem('token') || sessionStorage.getItem('token');
        if (!token) { window.location.href = '/dashboard'; }

        var cartTotal = 0, appliedCoupon = null, cartProductIds = [];

        async function loadCart() {
            try {
                var r = await fetch('/api/cart', { headers: { 'Authorization': 'Bearer ' + token } });
                var d = await r.json();
                
                const emptyCartEl = document.getElementById('emptyCart');
                const summaryEl = document.getElementById('cartSummary');
                const couponSectionEl = document.getElementById('couponSection');

                if (d.success && d.data && d.data.items && d.data.items.length > 0) {
                    emptyCartEl.style.display = 'none';
                    summaryEl.style.display = 'block';
                    couponSectionEl.style.display = 'flex';
                    
                    cartTotal = d.data.total;
                    cartProductIds = d.data.items.map(item => item.productId);
                    
                    var html = d.data.items.map(item => `
                        <div class="cart-item" id="item-${item.productId}">
                            <div class="cart-item-img">📦</div>
                            <div>
                                <div class="name">${item.productName}</div>
                                <div class="seller">${item.sellerName || 'CamBiz Verified'}</div>
                            </div>
                            <div class="price">${item.effectivePrice.toLocaleString()} XAF</div>
                            <div class="qty">x${item.quantity}</div>
                            <button class="remove-btn" onclick="removeItem(${item.productId})">✕</button>
                        </div>
                    `).join('');
                    
                    document.getElementById('cartItems').innerHTML = html;
                    
                    validateExistingCoupon();
                    updateDisplay();
                    if (!appliedCoupon) checkWelcomeCoupon();
                } else {
                    emptyCartEl.style.display = 'block';
                    summaryEl.style.display = 'none';
                    couponSectionEl.style.display = 'none';
                }
            } catch (e) { console.error("Load Cart Error:", e); }
        }

        async function applyCoupon() {
            var code = document.getElementById('couponCode').value.trim().toUpperCase();
            var msgEl = document.getElementById('couponMsg');
            if (!code) { showCouponMsg('Enter a code', 'error'); return; }
            
            try {
                var r = await fetch('/api/coupons/validate/' + code);
                var d = await r.json();
                if (d.success && d.data) {
                    var coupon = d.data;
                    if (coupon.productId && cartProductIds.indexOf(coupon.productId) === -1) {
                        showCouponMsg('❌ Coupon is for a specific product not in your cart', 'error');
                        return;
                    }
                    if (coupon.minOrderAmount && cartTotal < coupon.minOrderAmount) {
                        showCouponMsg('❌ Minimum order of ' + coupon.minOrderAmount.toLocaleString() + ' XAF required', 'error');
                        return;
                    }
                    appliedCoupon = coupon;
                    showCouponMsg('✅ ' + coupon.discountPercent + '% off applied!', 'success');
                    updateDisplay();
                } else {
                    appliedCoupon = null;
                    showCouponMsg('❌ ' + (d.message || 'Invalid coupon'), 'error');
                    updateDisplay();
                }
            } catch (e) { showCouponMsg('Network Error', 'error'); }
        }

        function validateExistingCoupon() {
            if (!appliedCoupon) return;
            if (appliedCoupon.minOrderAmount && cartTotal < appliedCoupon.minOrderAmount) {
                appliedCoupon = null;
                showCouponMsg('❌ Coupon removed: Minimum amount not met', 'error');
            }
            if (appliedCoupon.productId && !cartProductIds.includes(appliedCoupon.productId)) {
                appliedCoupon = null;
                showCouponMsg('❌ Coupon removed: Required product not in cart', 'error');
            }
        }

        function showCouponMsg(txt, type) {
            var msgEl = document.getElementById('couponMsg');
            msgEl.textContent = txt;
            msgEl.className = 'coupon-msg ' + type;
        }

        async function checkWelcomeCoupon() {
            try {
                var r = await fetch('/api/coupons/my-welcome', { headers: { 'Authorization': 'Bearer ' + token } });
                var d = await r.json();
                if (d.success && d.data) {
                    document.getElementById('couponCode').value = d.data.code;
                    applyCoupon();
                }
            } catch (e) {}
        }

        function updateDisplay() {
            document.getElementById('itemCount').textContent = cartProductIds.length;
            document.getElementById('subtotalAmount').textContent = cartTotal.toLocaleString() + ' XAF';
            
            var discount = 0;
            if (appliedCoupon) {
                discount = appliedCoupon.discountPercent ? (cartTotal * appliedCoupon.discountPercent / 100) : 0;
                if (appliedCoupon.maxDiscount && discount > appliedCoupon.maxDiscount) discount = appliedCoupon.maxDiscount;
                
                document.getElementById('discountLine').style.display = 'block';
                document.getElementById('discountAmount').textContent = discount.toLocaleString();
            } else {
                document.getElementById('discountLine').style.display = 'none';
            }
            
            var finalTotal = cartTotal - discount;
            document.getElementById('cartTotal').textContent = finalTotal.toLocaleString() + ' XAF';
            document.getElementById('checkoutAmount').textContent = finalTotal.toLocaleString() + ' XAF';
        }

        async function removeItem(pid) {
            const el = document.getElementById('item-' + pid);
            if (el) el.style.opacity = '0.5';

            try {
                var r = await fetch('/api/cart/remove/' + pid, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                var d = await r.json();
                if (d.success) loadCart();
            } catch (e) { if(el) el.style.opacity = '1'; }
        }

        async function checkout() {
            var btn = document.getElementById('checkoutBtn');
            var msg = document.getElementById('message');
            btn.disabled = true;
            btn.textContent = '⏳ Creating Order...';
            msg.className = 'message';
            
            try {
                var r = await fetch('/api/orders/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ 
                        paymentMethod: 'MTN_MONEY',
                        couponCode: appliedCoupon ? appliedCoupon.code : null 
                    })
                });
                var d = await r.json();
                if (d.success) {
                    localStorage.setItem('lastOrder', JSON.stringify(d.data));
                    window.location.href = '/payment';
                } else {
                    msg.textContent = '❌ ' + (d.message || 'Checkout failed');
                    msg.className = 'message error';
                    btn.disabled = false;
                    btn.textContent = '⚡ Buy Now — ' + document.getElementById('checkoutAmount').textContent;
                }
            } catch (e) {
                msg.textContent = '❌ Connection Error';
                msg.className = 'message error';
                btn.disabled = false;
                btn.textContent = '⚡ Buy Now — ' + document.getElementById('checkoutAmount').textContent;
            }
        }

        loadCart();
    </script>
</body>
</html>
