<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CamBiz Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 1rem 2.5rem; display: flex; justify-content: center; align-items: center; }
        .header .logo { font-size: 1.4rem; font-weight: 700; color: white; text-decoration: none; }
        .container { max-width: 600px; margin: 4rem auto; padding: 0 1.5rem; }
        .login-card { background: white; border-radius: 24px; padding: 3.5rem 2.5rem; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.06); }
        .login-card .icon { font-size: 4rem; margin-bottom: 1rem; }
        .login-card h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.5rem; }
        .login-card p { color: #636e72; margin-bottom: 2rem; font-size: 1rem; line-height: 1.5; }
        .btn { padding: 16px 36px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; font-size: 16px; margin: 8px; min-width: 200px; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #667eea; color: white; box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
        .btn-success { background: #00b894; color: white; box-shadow: 0 4px 16px rgba(0,184,148,0.3); }
        .login-form { display: none; margin-top: 2rem; padding: 2rem; background: #f8f9fa; border-radius: 16px; text-align: left; }
        .login-form input { display: block; width: 100%; padding: 14px 16px; margin-bottom: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; }
        .login-form input:focus { border-color: #667eea; outline: none; }
        .login-form button { width: 100%; margin: 0; }
        @media (max-width: 600px) { .login-card { padding: 2.5rem 1.5rem; } .container { margin: 2rem auto; } }
    </style>
</head>
<body>
    <header class="header"><a href="/store" class="logo">🛒 CamBiz Market</a></header>
    <div class="container">
        <div class="login-card">
            <div class="icon">🛒</div>
            <h1>Welcome to CamBiz Market</h1>
            <p>Cameroon's Premier E-Commerce Platform<br>Buy & Sell with Confidence</p>
            <button class="btn btn-primary" onclick="showLogin()">🔑 Login</button>
            <a href="/register" class="btn btn-success">📝 Create Account</a>
            <div class="login-form" id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button class="btn btn-primary" onclick="doLogin()">Login</button>
                <p id="loginError" style="color:#e74c3c; margin-top:12px; display:none;"></p>
            </div>
        </div>
    </div>
    <script>
        var token = localStorage.getItem('token') || sessionStorage.getItem('token');
        if (token) { window.location.href = '/store'; }
        function showLogin() { document.getElementById('loginForm').style.display = 'block'; }
        async function doLogin() {
            var email = document.getElementById('loginEmail').value; var password = document.getElementById('loginPassword').value; var errorEl = document.getElementById('loginError');
            try { var r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: password }) }); var d = await r.json(); if (d.success && d.data && d.data.token) { localStorage.setItem('token', d.data.token); window.location.href = '/store'; } else { errorEl.textContent = d.message || 'Login failed'; errorEl.style.display = 'block'; } } catch(e) { errorEl.textContent = 'Network error'; errorEl.style.display = 'block'; }
        }
    </script>
</body>
</html>
